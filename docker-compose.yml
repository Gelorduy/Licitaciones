services:
  nginx:
    image: nginx:1.27-alpine
    container_name: licitaciones-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - licitaciones

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: licitaciones-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    expose:
      - "8000"
    networks:
      - licitaciones

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: licitaciones-worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--sleep=1", "--tries=3", "--timeout=600"]
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks:
      - licitaciones

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: licitaciones-scheduler
    restart: unless-stopped
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction --verbose; sleep 60; done"]
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks:
      - licitaciones

  mysql:
    image: mysql:8.4
    container_name: licitaciones-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: licitaciones
      MYSQL_USER: licitaciones
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - licitaciones

  redis:
    image: redis:7-alpine
    container_name: licitaciones-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - licitaciones

  minio:
    image: minio/minio:latest
    container_name: licitaciones-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - licitaciones

  minio-init:
    image: minio/mc:latest
    container_name: licitaciones-minio-init
    restart: "no"
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: >
      'until mc alias set local http://minio:9000 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"; do
        echo "Waiting for MinIO...";
        sleep 2;
      done;
      mc mb --ignore-existing local/"$AWS_BUCKET";
      echo "MinIO bucket ready: $AWS_BUCKET";'
    networks:
      - licitaciones

  ollama:
    image: ollama/ollama:latest
    container_name: licitaciones-ollama
    restart: unless-stopped
    expose:
      - "11434"
    environment:
      - OLLAMA_KEEP_ALIVE=5m
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - licitaciones
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mysql_data:
  redis_data:
  minio_data:
  ollama_models:

networks:
  licitaciones:
    driver: bridge
