client_max_body_size 0;

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name licitaciones.local;
    client_max_body_size 30m;
    return 301 https://$host$request_uri;
}

# HTTPS + proxy to Laravel (PHP built-in server on port 8000)
server {
    listen 443 ssl;
    server_name licitaciones.local;
    client_max_body_size 30m;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Use Docker's embedded DNS so upstream IPs are re-resolved dynamically
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream http://app:8000;

    # Increase timeouts for long-running Inertia/SSE requests
    proxy_read_timeout  120;
    proxy_send_timeout  120;

    location / {
        client_max_body_size 0;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
